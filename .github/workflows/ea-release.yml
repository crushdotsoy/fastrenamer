name: EA Release

permissions:
  contents: write

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  prepare_ea_version:
    name: Prepare EA Version
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest

    outputs:
      ea_version: ${{ steps.version.outputs.ea_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute EA version
        id: version
        shell: bash
        run: |
          base_version="$(jq -r '.version' package.json)"
          ea_version="${base_version}-ea.${GITHUB_RUN_NUMBER}"
          echo "ea_version=${ea_version}" >> "${GITHUB_OUTPUT}"

  create_ea_release:
    name: Create EA Release
    needs:
      - prepare_ea_version
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create or refresh Early Access release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa ea -m "Early Access" "${RELEASE_SHA}"
          git push origin ea --force

          if gh release view ea --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit ea --repo "${GH_REPO}" --prerelease --title "Early Access" --notes "Latest early access build from main."
          else
            gh release create ea --repo "${GH_REPO}" --title "Early Access" --prerelease --target "${RELEASE_SHA}" --notes "Latest early access build from main."
          fi

  build_ea:
    name: Build EA ${{ matrix.platform_name }}
    needs:
      - prepare_ea_version
      - create_ea_release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_name: macOS
            build_command: bun run electron:build:mac:ea
          - os: windows-latest
            platform_name: Windows
            build_command: bun run electron:build:win:ea
          - os: ubuntu-latest
            platform_name: Linux
            build_command: bun run electron:build:linux:ea

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set EA package version
        shell: bash
        env:
          EA_VERSION: ${{ needs.prepare_ea_version.outputs.ea_version }}
        run: |
          jq --arg version "${EA_VERSION}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg version "${EA_VERSION}" '.version = $version' packages/rename-engine/package.json > packages/rename-engine/package.json.tmp
          mv packages/rename-engine/package.json.tmp packages/rename-engine/package.json

      - name: Build app
        run: ${{ matrix.build_command }}

      - name: Upload assets to Early Access release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          files=()
          while IFS= read -r file; do
            filename="$(basename "$file")"
            case "$filename" in
              builder-debug.yml)
                continue
                ;;
            esac
            files+=("$file")
          done < <(find release -maxdepth 1 -type f | sort)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          gh release upload ea "${files[@]}" --repo "${GH_REPO}" --clobber
