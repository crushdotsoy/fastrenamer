name: Experimental Release

permissions:
  contents: write

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  prepare_experimental_version:
    name: Prepare Experimental Version
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: blacksmith-2vcpu-ubuntu-2404

    outputs:
      experimental_version: ${{ steps.version.outputs.experimental_version }}
      experimental_tag: ${{ steps.version.outputs.experimental_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute experimental version
        id: version
        shell: bash
        run: |
          base_version="$(jq -r '.version' package.json)"
          experimental_version="${base_version}-experimental.${GITHUB_RUN_NUMBER}"
          experimental_tag="v${experimental_version}"
          echo "experimental_version=${experimental_version}" >> "${GITHUB_OUTPUT}"
          echo "experimental_tag=${experimental_tag}" >> "${GITHUB_OUTPUT}"

  create_experimental_release:
    name: Create Experimental Release
    needs:
      - prepare_experimental_version
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: blacksmith-2vcpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create experimental release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          TAG_NAME: ${{ needs.prepare_experimental_version.outputs.experimental_tag }}
          EXPERIMENTAL_VERSION: ${{ needs.prepare_experimental_version.outputs.experimental_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag ${TAG_NAME} already exists"
          else
            git tag -a "${TAG_NAME}" -m "Experimental ${EXPERIMENTAL_VERSION}" "${RELEASE_SHA}"
            git push origin "${TAG_NAME}"
          fi

          if gh release view "${TAG_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists"
          else
            gh release create "${TAG_NAME}" --repo "${GH_REPO}" --title "Experimental ${EXPERIMENTAL_VERSION}" --prerelease --target "${RELEASE_SHA}" --generate-notes
          fi

  build_experimental:
    name: Build Experimental ${{ matrix.platform_name }}
    needs:
      - prepare_experimental_version
      - create_experimental_release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_name: macOS
            build_command: bun run electron:build:mac:experimental
          - os: windows-latest
            platform_name: Windows
            build_command: bun run electron:build:win:experimental
          - os: ubuntu-latest
            platform_name: Linux
            build_command: bun run electron:build:linux:experimental

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set experimental package version
        shell: bash
        env:
          EXPERIMENTAL_VERSION: ${{ needs.prepare_experimental_version.outputs.experimental_version }}
        run: |
          jq --arg version "${EXPERIMENTAL_VERSION}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg version "${EXPERIMENTAL_VERSION}" '.version = $version' packages/rename-engine/package.json > packages/rename-engine/package.json.tmp
          mv packages/rename-engine/package.json.tmp packages/rename-engine/package.json

      - name: Build app
        run: ${{ matrix.build_command }}

      - name: Upload assets to experimental release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare_experimental_version.outputs.experimental_tag }}
        run: |
          files=()
          while IFS= read -r file; do
            filename="$(basename "$file")"
            case "$filename" in
              builder-debug.yml)
                continue
                ;;
            esac
            files+=("$file")
          done < <(find release -maxdepth 1 -type f | sort)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          gh release upload "${TAG_NAME}" "${files[@]}" --repo "${GH_REPO}" --clobber
