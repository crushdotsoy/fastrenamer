name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  create_release:
    name: Create Draft Release
    needs:
      - verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Create draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --generate-notes --draft

  build:
    name: Build ${{ matrix.platform_name }}
    needs:
      - verify
      - create_release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_name: macOS
            build_command: bun run electron:build:mac
          - os: windows-latest
            platform_name: Windows
            build_command: bun run electron:build:win
          - os: ubuntu-latest
            platform_name: Linux
            build_command: bun run electron:build:linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build app
        run: ${{ matrix.build_command }}

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          files=()
          while IFS= read -r file; do
            files+=("$file")
          done < <(find release -maxdepth 1 -type f ! -name 'builder-debug.yml' | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --repo "${GH_REPO}" --clobber

  publish_release:
    name: Publish Release
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --draft=false
