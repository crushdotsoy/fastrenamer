name: Build

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  prepare_ea_version:
    name: Prepare EA Version
    needs:
      - verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    outputs:
      ea_version: ${{ steps.version.outputs.ea_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute EA version
        id: version
        shell: bash
        run: |
          base_version="$(jq -r '.version' package.json)"
          ea_version="${base_version}-ea.${GITHUB_RUN_NUMBER}"
          echo "ea_version=${ea_version}" >> "${GITHUB_OUTPUT}"

  create_ea_release:
    name: Create EA Release
    needs:
      - prepare_ea_version
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create or refresh Early Access release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa ea -m "Early Access" "${GITHUB_SHA}"
          git push origin ea --force

          if gh release view ea --repo "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit ea --repo "${GH_REPO}" --prerelease --title "Early Access" --notes "Latest early access build from main."
          else
            gh release create ea --repo "${GH_REPO}" --title "Early Access" --prerelease --target "${GITHUB_SHA}" --notes "Latest early access build from main."
          fi

  build_ea:
    name: Build EA ${{ matrix.platform_name }}
    needs:
      - prepare_ea_version
      - create_ea_release
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_name: macOS
            build_command: bun run build && electron-builder --mac --publish never -c.publish.channel=ea
          - os: windows-latest
            platform_name: Windows
            build_command: bun run build && electron-builder --win --publish never -c.publish.channel=ea
          - os: ubuntu-latest
            platform_name: Linux
            build_command: bun run build && electron-builder --linux --publish never -c.publish.channel=ea

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set EA package version
        shell: bash
        env:
          EA_VERSION: ${{ needs.prepare_ea_version.outputs.ea_version }}
        run: |
          jq --arg version "${EA_VERSION}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg version "${EA_VERSION}" '.version = $version' packages/rename-engine/package.json > packages/rename-engine/package.json.tmp
          mv packages/rename-engine/package.json.tmp packages/rename-engine/package.json

      - name: Build app
        run: ${{ matrix.build_command }}

      - name: Upload assets to Early Access release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          files=()
          while IFS= read -r file; do
            filename="$(basename "$file")"
            case "$filename" in
              builder-debug.yml)
                continue
                ;;
            esac
            files+=("$file")
          done < <(find release -maxdepth 1 -type f | sort)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          gh release upload ea "${files[@]}" --repo "${GH_REPO}" --clobber

  create_release:
    name: Create Draft Release
    needs:
      - verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Create draft GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GH_REPO}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --title "${GITHUB_REF_NAME}" --generate-notes --draft

  build:
    name: Build Stable ${{ matrix.platform_name }}
    needs:
      - verify
      - create_release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform_name: macOS
            build_command: bun run build && electron-builder --mac --publish never
          - os: windows-latest
            platform_name: Windows
            build_command: bun run build && electron-builder --win --publish never
          - os: ubuntu-latest
            platform_name: Linux
            build_command: bun run build && electron-builder --linux --publish never

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set stable package version
        shell: bash
        run: |
          stable_version="${GITHUB_REF_NAME#v}"
          jq --arg version "${stable_version}" '.version = $version' package.json > package.json.tmp
          mv package.json.tmp package.json
          jq --arg version "${stable_version}" '.version = $version' packages/rename-engine/package.json > packages/rename-engine/package.json.tmp
          mv packages/rename-engine/package.json.tmp packages/rename-engine/package.json

      - name: Build app
        run: ${{ matrix.build_command }}

      - name: Upload assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          files=()
          latest_files=()
          ref_version="${GITHUB_REF_NAME#v}"

          make_latest_name() {
            local filename="$1"
            local latest_name="$filename"

            if [[ -n "${GITHUB_REF_NAME}" && "$latest_name" == *"${GITHUB_REF_NAME}"* ]]; then
              latest_name="${latest_name/${GITHUB_REF_NAME}/latest}"
            elif [[ -n "${ref_version}" && "$latest_name" == *"${ref_version}"* ]]; then
              latest_name="${latest_name/${ref_version}/latest}"
            else
              case "$latest_name" in
                *.tar.gz)
                  latest_name="${latest_name%.tar.gz}-latest.tar.gz"
                  ;;
                *.tar.xz)
                  latest_name="${latest_name%.tar.xz}-latest.tar.xz"
                  ;;
                *.tar.bz2)
                  latest_name="${latest_name%.tar.bz2}-latest.tar.bz2"
                  ;;
                *.*)
                  latest_name="${latest_name%.*}-latest.${latest_name##*.}"
                  ;;
                *)
                  latest_name="${latest_name}-latest"
                  ;;
              esac
            fi

            printf '%s\n' "$latest_name"
          }

          while IFS= read -r file; do
            filename="$(basename "$file")"
            case "$filename" in
              builder-debug.yml)
                continue
                ;;
            esac

            files+=("$file")

            case "$filename" in
              *.yml|*.yaml|*.blockmap)
                continue
                ;;
            esac

            latest_name="$(make_latest_name "$filename")"
            latest_file="release/${latest_name}"
            cp "$file" "$latest_file"
            latest_files+=("$latest_file")
          done < <(find release -maxdepth 1 -type f | sort)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release files found"
            exit 1
          fi

          gh release upload "${GITHUB_REF_NAME}" "${files[@]}" "${latest_files[@]}" --repo "${GH_REPO}" --clobber

  publish_release:
    name: Publish Release
    needs:
      - build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Publish draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release edit "${GITHUB_REF_NAME}" --repo "${GH_REPO}" --draft=false
